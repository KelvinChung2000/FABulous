name: Nightly GDS Flow CI

on:
  schedule:
    # Run every night at 2 AM UTC (offset from dependency test at midnight)
    - cron: "0 2 * * *"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gds-flow:
    name: GDS Flow (${{ matrix.pdk }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        pdk: [ihp-sg13g2, sky130A, gf180mcuD]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/prepare_nix_environment

      - name: Create project and generate RTL
        run: |
          nix develop --command bash -c "
            FABulous create-project test_project
            sed -i \"s/FAB_PDK=.*/FAB_PDK='${{ matrix.pdk }}'/\" test_project/.FABulous/.env
            echo 'PDK set to: ${{ matrix.pdk }}'
            cat test_project/.FABulous/.env
            FABulous --project-dir test_project run 'run_FABulous_fabric'
          "

      - name: Generate tile GDS
        run: |
          nix develop --command bash -c "
            FABulous --project-dir test_project run 'gen_all_tile_macros'
          " > tile_hardening_output.txt 2>&1

      - name: Verify tile manufacturability
        if: always()
        run: |
          # Extract all manufacturability report sections
          sed -n '/Report Manufacturability/,$p' tile_hardening_output.txt > tile_report.txt

          tail -300 tile_report.txt

          # Verify all 3 checks passed
          for check in "Antenna" "LVS" "DRC"; do
            if ! grep -A1 "^\* ${check}" tile_report.txt | grep -q "Passed"; then
              echo "FAIL: ${check} did not pass"
              exit 1
            fi
          done
          echo "All tile manufacturability checks passed"

      - name: Stitch fabric GDS
        run: |
          nix develop --command bash -c "
            FABulous --project-dir test_project run 'gen_fabric_macro'
          " > fabric_stitching_output.txt 2>&1

      - name: Verify fabric manufacturability
        if: always()
        run: |
          # Extract manufacturability report section
          sed -n '/Report Manufacturability/,$p' fabric_stitching_output.txt > fabric_report.txt

          tail -300 fabric_report.txt

          # Verify all 3 checks passed
          for check in "Antenna" "LVS" "DRC"; do
            if ! grep -A1 "^\* ${check}" fabric_report.txt | grep -q "Passed"; then
              echo "FAIL: ${check} did not pass"
              exit 1
            fi
          done
          echo "All fabric manufacturability checks passed"

      - name: Upload GDS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gds-output-${{ matrix.pdk }}
          path: |
            test_project/Tile/*/macro/final_views/gds/
            test_project/Fabric/macro/*/final_views/gds/
            tile_hardening_output.txt
            fabric_stitching_output.txt
            tile_report.txt
            fabric_report.txt
          if-no-files-found: warn
          retention-days: 2

      - name: Prepare failure issue body
        if: failure()
        id: failure_body
        shell: bash
        run: |
          # Use manufacturability reports if available, fall back to last 100 lines of full output
          TILE_OUTPUT="No output captured"
          if [ -f tile_report.txt ] && [ -s tile_report.txt ]; then
            TILE_OUTPUT=$(cat tile_report.txt)
          elif [ -f tile_hardening_output.txt ]; then
            TILE_OUTPUT=$(tail -100 tile_hardening_output.txt)
          fi

          FABRIC_OUTPUT="No output captured"
          if [ -f fabric_report.txt ] && [ -s fabric_report.txt ]; then
            FABRIC_OUTPUT=$(cat fabric_report.txt)
          elif [ -f fabric_stitching_output.txt ]; then
            FABRIC_OUTPUT=$(tail -100 fabric_stitching_output.txt)
          fi

          DATE=$(date -u +%Y-%m-%d)
          PDK="${{ matrix.pdk }}"

          echo "title=GDS Flow CI Failed - ${PDK} - ${DATE}" >> "$GITHUB_OUTPUT"

          # Use heredoc for multiline body
          {
            echo 'body<<ISSUE_BODY_EOF'
            cat <<EOF
          ## GDS Flow CI Failed

          **PDK:** \`${PDK}\`
          **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ### Tile Hardening Manufacturability Report
          <details><summary>Click to expand</summary>

          \`\`\`
          ${TILE_OUTPUT}
          \`\`\`
          </details>

          ### Fabric Stitching Manufacturability Report
          <details><summary>Click to expand</summary>

          \`\`\`
          ${FABRIC_OUTPUT}
          \`\`\`
          </details>

          ### Action Items
          - [ ] Check if failure is in tile hardening or fabric stitching
          - [ ] Review EDA tool logs for DRC/timing violations
          - [ ] Check if PDK or librelane updates caused regression

          ---
          *Automatically created by GDS Flow CI*
          EOF
            echo 'ISSUE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create issue on failure
        if: false
        uses: ./.github/actions/create_failure_issue
        with:
          title: ${{ steps.failure_body.outputs.title }}
          body: ${{ steps.failure_body.outputs.body }}
          labels: "gds-flow-failure, automated"
          github_token: ${{ secrets.GITHUB_TOKEN }}
