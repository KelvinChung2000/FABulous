name: Nix environment CI

on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "*.lock"
      - "pyproject.toml"
      - "nix/**"
      - ".github/workflows/nix-env.yml"
  pull_request:
    paths:
      - "flake.nix"
      - "*.lock"
      - "pyproject.toml"
      - "nix/**"
      - ".github/workflows/nix-env.yml"
  # warm `nix-*` cache existing on `main` to fall back to
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  # Needed so the main cache-maintaining run can delete superseded Nix store
  # caches (purge). PR runs keep the default read-only token and never purge.
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-smoke-test:
    name: Smoke test (Nix ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, ubuntu-22.04]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: ./.github/actions/prepare_nix_environment
        with:
          # Only the main base cache prunes its old generations
          purge_old_caches: ${{ github.ref == 'refs/heads/main' }}

      - name: DevShell smoke test
        run: |
          nix develop --command bash -c "FABulous --version"
          nix develop --command bash -c "openroad -version"
          nix develop --command bash -c "yosys --version"
          nix develop --command bash -c "fab-yosys -m ghdl -p help"
