name: Nix environment CI

on:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "*.lock"
      - "pyproject.toml"
      - "nix/**"
      - ".github/workflows/nix-env.yml"
  # PR / merge_group runs come through ci.yml.
  workflow_call:
  # warm `nix-*` cache existing on `main` to fall back to
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  # Needed so the main cache-maintaining run can delete superseded Nix store
  # caches (purge). PR runs keep the default read-only token and never purge.
  actions: write

concurrency:
  # Literal, not `github.workflow`: under workflow_call that resolves to the
  # *caller's* name, folding this into the caller's group.
  group: nix-env-${{ github.ref }}
  # Never under merge_group: a cancelled leg surfaces as `cancelled` to ci.yml's
  # all-clean fan-in, which fails it and evicts the PR from the queue.
  cancel-in-progress: ${{ github.event_name != 'merge_group' }}

jobs:
  nix-smoke-test:
    name: Smoke test (Nix ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, ubuntu-22.04]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: ./.github/actions/prepare_nix_environment
        with:
          # Only the main base cache prunes its old generations
          purge_old_caches: ${{ github.ref == 'refs/heads/main' }}

      - name: DevShell smoke test
        run: |
          nix develop --command bash -c "FABulous --version"
          nix develop --command bash -c "openroad -version"
          nix develop --command bash -c "yosys --version"
          nix develop --command bash -c "fab-yosys -m ghdl -p help"

      - name: End-to-end flow
        # FABulous is on PATH in the devshell; skip `uv run` (its .venv is a
        # different Python and ABI-incompatible with the devshell packages).
        run: nix develop --command task smoke-test FABULOUS=FABulous
