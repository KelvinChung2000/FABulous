on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

name: release-please

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RP_APP_ID }}
          private-key: ${{ secrets.RP_APP_PK }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Update AUTHORS.md on release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          PR_BRANCH=$(printf '%s' "$PR_JSON" | jq -r '.headBranchName')
          git fetch origin "$PR_BRANCH"
          git checkout "$PR_BRANCH"
          {
            echo "# Authors"
            echo ""
            echo "FABulous is developed and maintained by the following contributors."
            echo "This list is generated automatically from the GitHub contributors API and refreshed with each release. For the always-current list of contributors between releases, see the [GitHub contributors page](../../graphs/contributors)."
            echo ""
            gh api --paginate "repos/${{ github.repository }}/contributors?per_page=100" \
              --jq '.[] | select(.type=="User") | "- [@\(.login)](https://github.com/\(.login))"'
          } > AUTHORS.md
          if [[ -n "$(git status --porcelain AUTHORS.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add AUTHORS.md
            git commit -m "chore: update AUTHORS.md"
            git push origin "$PR_BRANCH"
          fi
