files: ^(fabulous|docs|nix|tests)/|\.nix$
default_language_version:
  python: python3.12
repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.13
    hooks:
      - id: uv-lock

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-ast
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-toml
      - id: no-commit-to-branch

  - repo: local
    hooks:
      - id: interrogate
        name: interrogate
        entry: interrogate
        language: python
        args: [ -vv, -c, pyproject.toml ]
        pass_filenames: false # needed if excluding files with pyproject.toml or setup.cfg
      - id: deptry
        name: deptry
        entry: deptry .
        language: python
        pass_filenames: false
        always_run: true
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: forbid-crlf
      - id: remove-crlf
      - id: forbid-tabs
      - id: remove-tabs

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.12
    hooks:
      # Run the linter.
      - id: ruff
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format

  - repo: https://github.com/jsh9/pydoclint
    rev: 0.8.3
    hooks:
      - id: pydoclint
        args: [ --style=numpy ]

  - repo: https://github.com/jeremiah-c-leary/vhdl-style-guide
    rev: 3.35.0
    hooks:
      - id: vsg
        args: [ --configuration=.vsg.yaml ]

  # Verilog / SystemVerilog linting — upstream hook (Docker-backed)
  - repo: https://github.com/verilator/verilator
    rev: v5.048 # refreshed by `pre-commit autoupdate`
    hooks:
      - id: verilator
        # Waivers are inherent to pre-commit's per-file linting, not real design defects:
        args:
          [
            --lint-only,
            -Wno-MODMISSING,
            -Wno-TIMESCALEMOD,
            -Wno-MULTITOP,
            -Wno-MODDUP,
          ]
        exclude: ^fabulous/fabric_files/FABulous_project_template_common/Tile/include/.*_latchmap\.v$

  # Verilog / SystemVerilog linting — upstream svlint static binary.
  # scripts/svlint_wrapper.py downloads and caches the pinned release on first
  # invocation, so no manual install is required.
  - repo: local
    hooks:
      - id: svlint
        name: svlint
        description: Lint (System)Verilog with upstream svlint
        language: script
        entry: scripts/svlint_wrapper.py --config .svlint.toml
        types_or: [ verilog, system-verilog ]
