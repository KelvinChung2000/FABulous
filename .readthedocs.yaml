version: 2

build:
  os: "ubuntu-24.04"
  tools:
    python: "3.12"

# Install the docs dependencies with uv. Read the Docs supports uv natively, so
# it runs `uv sync` in docs/ (reading docs/pyproject.toml and docs/uv.lock) into
# its build virtualenv. No manual virtualenv handling is needed.
python:
  install:
    - method: uv
      command: sync
      path: docs

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: true

formats:
  - pdf
  - epub
