# yaml-language-server: $schema=https://taskfile.dev/schema.json
# https://taskfile.dev
#
# Verilog simulation and build tasks for FABulous projects.
# Override any variable via CLI: task run-simulation DESIGN=my_design WAVEFORM_TYPE=vcd
version: "3"

dotenv: ["../.FABulous/.env"]

includes:
  compile:
    taskfile: "./compile.Taskfile.yml"

vars:
  MAX_BITBYTES: '{{.MAX_BITBYTES | default "16384"}}'
  FAB_PROJ_ROOT: '{{.FAB_PROJ_ROOT | default ".."}}'
  BUILD_DIR: '{{.BUILD_DIR | default "build"}}'
  DESIGN: '{{.DESIGN | default "sequential_16bit_en"}}'
  TESTBENCH: "{{.DESIGN}}_tb"
  TOP_WRAPPER: '{{.TOP_WRAPPER | default "top_wrapper"}}'
  USER_DESIGN_DIR: "{{.FAB_PROJ_ROOT}}/user_design"
  WAVEFORM_TYPE: '{{.WAVEFORM_TYPE | default "fst"}}'
  EXTRA_IVERILOG_FLAGS: '{{.EXTRA_IVERILOG_FLAGS | default ""}}'
  BITSTREAM_BIN: '{{.BITSTREAM_BIN | default "{{.BUILD_DIR}}/{{.DESIGN}}.bin"}}'
  FABRIC_FILES_DIR: "{{.BUILD_DIR}}/fabric_files"

tasks:
  fab-sim:
    aliases: [default]
    desc: Build demo fabric, build test design, run simulation, then clean up
    cmds:
      - task: build-demo-fabric
      - task: build-test-design
      - task: run-simulation
      - task: clean

  full-sim:
    desc: Run FABulous demo, build test design, run simulation + emulation, then clean up
    cmds:
      - task: run-fabulous-demo
      - task: build-test-design
      - task: run-emulation
      - task: run-simulation
      - task: clean

  build-test-design:
    desc: Synthesize, place & route, generate bitstream, and copy fabric files
    cmds:
      - task: run-yosys
      - task: run-nextpnr
      - task: run-bitgen
      - task: copy-files

  run-fabulous-demo:
    desc: Run FABulous to generate the default fabric
    cmds:
      - FABulous {{.FAB_PROJ_ROOT}} -fs {{.FAB_PROJ_ROOT}}/FABulous.tcl
      # FABulous removes build dirs during simulation; re-create afterwards.
      - mkdir -p {{.BUILD_DIR}} {{.FABRIC_FILES_DIR}}
      - mv -f {{.DESIGN}}.hex {{.BUILD_DIR}}/
      - mv -f {{.DESIGN}}.fst {{.BUILD_DIR}}/
      - cp -fu {{.USER_DESIGN_DIR}}/* {{.BUILD_DIR}}

  build-demo-fabric:
    desc: Build the default fabric only (no simulation)
    cmds:
      - task: mkdir-build
      - FABulous {{.FAB_PROJ_ROOT}} -ts ./build_fabulous_fabric.tcl

  run-yosys:
    desc: Run Yosys synthesis
    deps: [mkdir-build]
    vars:
      CUSTOM_PRIMS:
        sh: '[ -f "{{.USER_DESIGN_DIR}}/custom_prims.v" ] && echo "-extra-plib {{.USER_DESIGN_DIR}}/custom_prims.v" || true'
      RESOLVED_DESIGN_FILES: '{{.DESIGN_FILES | default (printf "%s/%s.v" .USER_DESIGN_DIR .DESIGN)}}'
      RESOLVED_TOP_WRAPPER_FILE: '{{.TOP_WRAPPER_FILE | default (printf "%s/%s.v" .USER_DESIGN_DIR .TOP_WRAPPER)}}'
      RESOLVED_JSON_FILE: '{{.JSON_FILE | default (printf "%s/%s.json" .BUILD_DIR .DESIGN)}}'
    cmds:
      - task: compile:compile-yosys
        vars:
          YOSYS_EXTRA_ARGS: '{{.YOSYS_EXTRA_ARGS | default ""}}'
          SYNTH_CMD: 'synth_fabulous -top {{.TOP_WRAPPER}} -json {{.RESOLVED_JSON_FILE}} {{.CUSTOM_PRIMS}} {{.SYNTH_EXTRA_ARGS | default ""}}'
          DESIGN_FILES: "{{.RESOLVED_DESIGN_FILES}}"
          TOP_WRAPPER_FILE: "{{.RESOLVED_TOP_WRAPPER_FILE}}"

  run-nextpnr:
    desc: Run nextpnr place and route
    deps: [mkdir-build]
    cmds:
      - task: compile:compile-nextpnr
        vars:
          FAB_PROJ_ROOT: "{{.FAB_PROJ_ROOT}}"
          JSON_FILE: '{{.JSON_FILE | default (printf "%s/%s.json" .BUILD_DIR .DESIGN)}}'
          FASM_FILE: '{{.FASM_FILE | default (printf "%s/%s.fasm" .BUILD_DIR .DESIGN)}}'
          LOG_FILE: '{{.LOG_FILE | default ""}}'
          NEXTPNR_EXTRA_ARGS: '{{.NEXTPNR_EXTRA_ARGS | default ""}}'
          NEXTPNR_VERBOSE: '{{.NEXTPNR_VERBOSE | default ""}}'

  run-bitgen:
    desc: Generate bitstream and hex file
    deps: [mkdir-build]
    vars:
      RESOLVED_FASM_FILE: '{{.FASM_FILE | default (printf "%s/%s.fasm" .BUILD_DIR .DESIGN)}}'
      RESOLVED_BIN_FILE: '{{.BIN_FILE | default (printf "%s/%s.bin" .BUILD_DIR .DESIGN)}}'
    cmds:
      - task: compile:compile-bitgen
        vars:
          FAB_PROJ_ROOT: "{{.FAB_PROJ_ROOT}}"
          FASM_FILE: "{{.RESOLVED_FASM_FILE}}"
          BIN_FILE: "{{.RESOLVED_BIN_FILE}}"
      - >-
        python3 makehex.py
        {{.RESOLVED_BIN_FILE}}
        {{.MAX_BITBYTES}}
        {{.BUILD_DIR}}/{{.DESIGN}}.hex

  copy-files:
    desc: Copy Verilog fabric files to build directory
    deps: [mkdir-build]
    cmds:
      - find {{.FAB_PROJ_ROOT}}/Tile/ -name '*.v' -type f -exec cp {} {{.FABRIC_FILES_DIR}}/ \;
      - find {{.FAB_PROJ_ROOT}}/Fabric/ -name '*.v' -type f -exec cp {} {{.FABRIC_FILES_DIR}}/ \;

  run-simulation:
    desc: Run simulation using Icarus Verilog (iverilog)
    deps: [mkdir-build, copy-files]
    cmds:
      - >-
        iverilog -g2012
        {{.EXTRA_IVERILOG_FLAGS}}
        -s {{.TESTBENCH}}
        -o {{.BUILD_DIR}}/{{.DESIGN}}.vvp
        {{.FABRIC_FILES_DIR}}/*
        {{.USER_DESIGN_DIR}}/{{.DESIGN}}.v
        {{.TESTBENCH}}.v
      - >-
        vvp {{.BUILD_DIR}}/{{.DESIGN}}.vvp
        +output_waveform={{.BUILD_DIR}}/{{.DESIGN}}.{{.WAVEFORM_TYPE}}
        +bitstream_hex={{.BUILD_DIR}}/{{.DESIGN}}.hex
        {{if eq .WAVEFORM_TYPE "fst"}}-fst{{end}}

  gen-force-block:
    desc: Generate force_block.vh (gate-level X-init) from the hardened netlists
    deps: [mkdir-build]
    cmds:
      # gen_gl_xinit.py emits one $deposit per fabric net plus an async-reset
      # pulse per flop; the reset pin is chosen from FAB_PDK. Requires the
      # hardened netlists to be present (run the GDS flow, or `mock-macros`).
      - >-
        python3 gen_gl_xinit.py
        --efpga {{.FAB_PROJ_ROOT}}/Fabric/macro/final_views/nl/eFPGA.nl.v
        --tile-dir {{.FAB_PROJ_ROOT}}/Tile
        --pdk {{.FAB_PDK}}
        --top-inst top_i.eFPGA_inst
        --trigger config_done
        --out force_block.vh

  run-gl-simulation:
    desc: Gate-level (mixed-level) simulation against the hardened fabric netlist
    deps: [mkdir-build, gen-force-block]
    # GL_SOURCES -- the complete gate-level source list (behavioural wrapper with
    # the eFPGA.v core excluded, the fabric netlist eFPGA.nl.v, the tile
    # netlists, and the PDK standard-cell models) -- it is populated only by the
    # `run_simulation --gl` CLI command, not by the Taskfile.
    preconditions:
      - sh: 'test -n "{{.GL_SOURCES}}"'
        msg: >-
          GL_SOURCES is not set. It is normally populated by the FABulous CLI
          (`run_simulation fst <bitstream>.bin --gl`), which resolves the
          hardened netlists and PDK cell models for you. To run this task on its
          own, set GL_SOURCES yourself to the gate-level source list, e.g.
          `task run-gl-simulation GL_SOURCES="<netlists and cell models>"`.
    cmds:
      # `-gspecify` processes the PDK specify blocks so the cell timing models
      # have non-zero delays. `-DGL_SIM` compiles in the force_block.vh X-init.
      # The token timing token is only honoured inside an iverilog command file,
      # so it is written to gl_timescale.f and passed via `-f`.
      - echo '+timescale+1ns/1ps' > {{.BUILD_DIR}}/gl_timescale.f
      - >-
        iverilog -g2012 -gspecify -DGL_SIM -f {{.BUILD_DIR}}/gl_timescale.f
        {{.EXTRA_IVERILOG_FLAGS}}
        -s {{.TESTBENCH}}
        -o {{.BUILD_DIR}}/{{.DESIGN}}_gl.vvp
        {{.GL_SOURCES}}
        {{.USER_DESIGN_DIR}}/{{.DESIGN}}.v
        {{.TESTBENCH}}.v
      - >-
        vvp {{.BUILD_DIR}}/{{.DESIGN}}_gl.vvp
        +output_waveform={{.BUILD_DIR}}/{{.DESIGN}}_gl.{{.WAVEFORM_TYPE}}
        +bitstream_hex={{.BUILD_DIR}}/{{.DESIGN}}.hex
        {{if eq .WAVEFORM_TYPE "fst"}}-fst{{end}}

  run-emulation:
    desc: Run emulation using Icarus Verilog (iverilog)
    deps: [mkdir-build]
    cmds:
      - >-
        iverilog -g2012 -D EMULATION
        {{.EXTRA_IVERILOG_FLAGS}}
        -s {{.TESTBENCH}}
        -o {{.BUILD_DIR}}/{{.DESIGN}}.vvp
        {{.BUILD_DIR}}/{{.DESIGN}}.vh
        {{.FABRIC_FILES_DIR}}/*
        {{.USER_DESIGN_DIR}}/{{.DESIGN}}.v
        {{.TESTBENCH}}.v
      - >-
        vvp {{.BUILD_DIR}}/{{.DESIGN}}.vvp
        +output_waveform={{.BUILD_DIR}}/{{.DESIGN}}.{{.WAVEFORM_TYPE}}
        +bitstream_hex={{.BUILD_DIR}}/{{.DESIGN}}.hex
        {{if eq .WAVEFORM_TYPE "fst"}}-fst{{end}}

  gtkwave:
    desc: Open waveform in GTKWave
    cmds:
      - gtkwave {{.BUILD_DIR}}/{{.DESIGN}}.{{.WAVEFORM_TYPE}}

  mkdir-build:
    internal: true
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - mkdir -p {{.FABRIC_FILES_DIR}}
    status:
      - test -d {{.BUILD_DIR}}
      - test -d {{.FABRIC_FILES_DIR}}

  clean:
    desc: Remove build directory
    cmds:
      - rm -rf {{.BUILD_DIR}}
