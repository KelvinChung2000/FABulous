# yaml-language-server: $schema=https://taskfile.dev/schema.json
# https://taskfile.dev
#
# VHDL simulation and build tasks for FABulous projects.
# Override any variable via CLI: task run-simulation DESIGN=my_design WAVEFORM_TYPE=vcd
version: "3"

dotenv: ["../.FABulous/.env"]

includes:
  compile:
    taskfile: "./compile.Taskfile.yml"

vars:
  MAX_BITBYTES: '{{.MAX_BITBYTES | default "16384"}}'
  FAB_PROJ_ROOT: '{{.FAB_PROJ_ROOT | default ".."}}'
  BUILD_DIR: '{{.BUILD_DIR | default "build"}}'
  DESIGN: '{{.DESIGN | default "sequential_16bit_en"}}'
  TESTBENCH: "{{.DESIGN}}_tb"
  TOP_WRAPPER: '{{.TOP_WRAPPER | default "top_wrapper"}}'
  USER_DESIGN_DIR: "{{.FAB_PROJ_ROOT}}/user_design"
  WAVEFORM_TYPE: '{{.WAVEFORM_TYPE | default "fst"}}'
  SIMULATOR: '{{.SIMULATOR | default "auto"}}'
  NVC_GLOBAL_FLAGS: '--std=2008 -L {{.BUILD_DIR}} -H 2g -M 1g --ieee-warnings=off --work={{.BUILD_DIR}}/work'
  NVC_ANALYZE_FLAGS: '{{.NVC_ANALYZE_FLAGS | default ""}}'
  NVC_ELAB_FLAGS: '{{.NVC_ELAB_FLAGS | default "-O2"}}'
  EXTRA_NVC_FLAGS: '{{.EXTRA_NVC_FLAGS | default ""}}'
  GHDL_GLOBAL_FLAGS: '{{.GHDL_GLOBAL_FLAGS | default (printf "--std=08 -O2 --workdir=%s" .BUILD_DIR)}}'
  GHDL_ANALYZE_FLAGS: '{{.GHDL_ANALYZE_FLAGS | default ""}}'
  GHDL_ELAB_FLAGS: '{{.GHDL_ELAB_FLAGS | default "-fexplicit"}}'
  EXTRA_GHDL_FLAGS: '{{.EXTRA_GHDL_FLAGS | default ""}}'
  BITSTREAM_BIN: '{{.BITSTREAM_BIN | default "{{.BUILD_DIR}}/{{.DESIGN}}.bin"}}'

tasks:
  fab-sim:
    aliases: ["default"]
    desc: Build demo fabric, build test design, run simulation, then clean up
    cmds:
      - task: build-demo-fabric
      - task: build-test-design
      - task: run-simulation
      - task: clean

  full-sim:
    desc: Run FABulous demo, build test design, run simulation, then clean up
    cmds:
      - task: run-fabulous-demo
      - task: build-test-design
      - task: run-simulation
      - task: clean

  build-test-design:
    desc: Synthesize, place & route, and generate bitstream
    cmds:
      - task: run-yosys
      - task: run-nextpnr
      - task: run-bitgen

  run-fabulous-demo:
    desc: Run FABulous to generate the default fabric
    cmds:
      - FABulous {{.FAB_PROJ_ROOT}} -fs {{.FAB_PROJ_ROOT}}/FABulous.tcl

  build-demo-fabric:
    desc: Build the default fabric only (no simulation)
    cmds:
      - task: mkdir-build
      - FABulous {{.FAB_PROJ_ROOT}} -ts ./build_fabulous_fabric.tcl

  run-yosys:
    desc: Run Yosys synthesis (GHDL plugin for VHDL, top_wrapper still Verilog)
    deps: [mkdir-build]
    vars:
      CUSTOM_PRIMS:
        sh: '[ -f "{{.USER_DESIGN_DIR}}/custom_prims.v" ] && echo "-extra-plib {{.USER_DESIGN_DIR}}/custom_prims.v" || true'
      RESOLVED_DESIGN_FILES: '{{.DESIGN_FILES | default (printf "%s/%s.vhdl" .USER_DESIGN_DIR .DESIGN)}}'
      RESOLVED_TOP_WRAPPER_FILE: '{{.TOP_WRAPPER_FILE | default (printf "%s/%s.v" .USER_DESIGN_DIR .TOP_WRAPPER)}}'
      RESOLVED_JSON_FILE: '{{.JSON_FILE | default (printf "%s/%s.json" .BUILD_DIR .DESIGN)}}'
    cmds:
      - task: compile:compile-yosys
        vars:
          YOSYS_GHDL: "-m ghdl"
          YOSYS_EXTRA_ARGS: '{{.YOSYS_EXTRA_ARGS | default ""}}'
          SYNTH_CMD: "ghdl {{.RESOLVED_DESIGN_FILES}} -e {{.DESIGN}}; read_verilog {{.RESOLVED_TOP_WRAPPER_FILE}}; synth_fabulous -top {{.TOP_WRAPPER}} -json {{.RESOLVED_JSON_FILE}} {{.CUSTOM_PRIMS}} {{.SYNTH_EXTRA_ARGS | default \"\"}};"
          DESIGN_FILES: ""
          TOP_WRAPPER_FILE: ""

  run-nextpnr:
    desc: Run nextpnr place and route
    deps: [mkdir-build]
    cmds:
      - task: compile:compile-nextpnr
        vars:
          FAB_PROJ_ROOT: "{{.FAB_PROJ_ROOT}}"
          JSON_FILE: '{{.JSON_FILE | default (printf "%s/%s.json" .BUILD_DIR .DESIGN)}}'
          FASM_FILE: '{{.FASM_FILE | default (printf "%s/%s.fasm" .BUILD_DIR .DESIGN)}}'
          LOG_FILE: '{{.LOG_FILE | default ""}}'
          NEXTPNR_EXTRA_ARGS: '{{.NEXTPNR_EXTRA_ARGS | default ""}}'
          NEXTPNR_VERBOSE: '{{.NEXTPNR_VERBOSE | default ""}}'

  run-bitgen:
    desc: Generate bitstream and hex file
    deps: [mkdir-build]
    vars:
      RESOLVED_FASM_FILE: '{{.FASM_FILE | default (printf "%s/%s.fasm" .BUILD_DIR .DESIGN)}}'
      RESOLVED_BIN_FILE: '{{.BIN_FILE | default (printf "%s/%s.bin" .BUILD_DIR .DESIGN)}}'
    cmds:
      - task: compile:compile-bitgen
        vars:
          FAB_PROJ_ROOT: "{{.FAB_PROJ_ROOT}}"
          FASM_FILE: "{{.RESOLVED_FASM_FILE}}"
          BIN_FILE: "{{.RESOLVED_BIN_FILE}}"
      - >-
        python3 makehex.py
        {{.RESOLVED_BIN_FILE}}
        {{.MAX_BITBYTES}}
        {{.BUILD_DIR}}/{{.DESIGN}}.hex

  run-simulation:
    desc: Run simulation (auto-detects NVC/GHDL, or use SIMULATOR=nvc/ghdl)
    deps: [mkdir-build]
    env:
      BUILD_DIR: '{{.BUILD_DIR}}'
    cmds:
      - |
        SIM="{{.SIMULATOR}}"
        if [ "$SIM" = "nvc" ]; then
          if ! which nvc >/dev/null 2>&1; then
            echo "Error: SIMULATOR=nvc but nvc is not installed or not found in PATH" >&2
            exit 1
          fi
          task run-simulation-nvc
        elif [ "$SIM" = "ghdl" ]; then
          task run-simulation-ghdl
        elif [ "$SIM" = "auto" ]; then
          if which nvc >/dev/null 2>&1; then
            task run-simulation-nvc
          else
            task run-simulation-ghdl
          fi
        else
          echo "Error: Unknown SIMULATOR value '$SIM'. Use nvc, ghdl, or auto." >&2
          exit 1
        fi

  run-simulation-nvc:
    env:
      FAB_PROJ_ROOT: '{{.FAB_PROJ_ROOT}}'
      USER_DESIGN_DIR: '{{.USER_DESIGN_DIR}}'
      BUILD_DIR: '{{.BUILD_DIR}}'
      DESIGN: '{{.DESIGN}}'
      TESTBENCH: '{{.TESTBENCH}}'
      WAVEFORM_TYPE: '{{.WAVEFORM_TYPE}}'
    cmds:
      - nvc {{.NVC_GLOBAL_FLAGS}} -a {{.NVC_ANALYZE_FLAGS}} {{.EXTRA_NVC_FLAGS}} $FAB_PROJ_ROOT/Fabric/models_pack.vhdl
      - sh -c 'for f in $(find $FAB_PROJ_ROOT/Tile/ -name "*.vhdl" -type f); do nvc {{.NVC_GLOBAL_FLAGS}} -a {{.NVC_ANALYZE_FLAGS}} {{.EXTRA_NVC_FLAGS}} "$f"; done'
      - sh -c 'for f in $(find $FAB_PROJ_ROOT/Fabric/ -name "*.vhdl" -type f ! -name "models_pack.vhdl"); do nvc {{.NVC_GLOBAL_FLAGS}} -a {{.NVC_ANALYZE_FLAGS}} {{.EXTRA_NVC_FLAGS}} "$f"; done'
      - nvc {{.NVC_GLOBAL_FLAGS}} -a {{.NVC_ANALYZE_FLAGS}} {{.EXTRA_NVC_FLAGS}} $USER_DESIGN_DIR/$DESIGN.vhdl $TESTBENCH.vhdl
      - nvc {{.NVC_GLOBAL_FLAGS}} -e {{.NVC_ELAB_FLAGS}} {{.EXTRA_NVC_FLAGS}} $TESTBENCH
      - sh -c 'ulimit -s unlimited; nvc {{.NVC_GLOBAL_FLAGS}} -r {{.EXTRA_NVC_FLAGS}} $TESTBENCH -w$BUILD_DIR/$TESTBENCH.$WAVEFORM_TYPE --stats'

  run-simulation-ghdl:
    env:
      FAB_PROJ_ROOT: '{{.FAB_PROJ_ROOT}}'
      USER_DESIGN_DIR: '{{.USER_DESIGN_DIR}}'
      BUILD_DIR: '{{.BUILD_DIR}}'
      DESIGN: '{{.DESIGN}}'
      TESTBENCH: '{{.TESTBENCH}}'
      WAVEFORM_TYPE: '{{.WAVEFORM_TYPE}}'
    cmds:
      - ghdl -a {{.GHDL_GLOBAL_FLAGS}} {{.GHDL_ANALYZE_FLAGS}} {{.EXTRA_GHDL_FLAGS}} $FAB_PROJ_ROOT/Fabric/models_pack.vhdl
      - sh -c 'for f in $(find $FAB_PROJ_ROOT/Tile/ -name "*.vhdl" -type f); do ghdl -a {{.GHDL_GLOBAL_FLAGS}} {{.GHDL_ANALYZE_FLAGS}} {{.EXTRA_GHDL_FLAGS}} "$f"; done'
      - sh -c 'for f in $(find $FAB_PROJ_ROOT/Fabric/ -name "*.vhdl" -type f ! -name "models_pack.vhdl"); do ghdl -a {{.GHDL_GLOBAL_FLAGS}} {{.GHDL_ANALYZE_FLAGS}} {{.EXTRA_GHDL_FLAGS}} "$f"; done'
      - ghdl -a {{.GHDL_GLOBAL_FLAGS}} {{.GHDL_ANALYZE_FLAGS}} {{.EXTRA_GHDL_FLAGS}} $USER_DESIGN_DIR/$DESIGN.vhdl $TESTBENCH.vhdl
      - ghdl -e {{.GHDL_GLOBAL_FLAGS}} {{.GHDL_ELAB_FLAGS}} {{.EXTRA_GHDL_FLAGS}} $TESTBENCH
      - sh -c 'ulimit -s unlimited; ghdl -r {{.GHDL_GLOBAL_FLAGS}} {{.EXTRA_GHDL_FLAGS}} $TESTBENCH --stats --ieee-asserts=disable --{{.WAVEFORM_TYPE}}=$BUILD_DIR/$TESTBENCH.{{.WAVEFORM_TYPE}}'

  gtkwave:
    desc: Open waveform in GTKWave
    cmds:
      - gtkwave {{.BUILD_DIR}}/{{.TESTBENCH}}.{{.WAVEFORM_TYPE}}

  mkdir-build:
    internal: true
    cmds:
      - mkdir -p {{.BUILD_DIR}}
    status:
      - test -d {{.BUILD_DIR}}

  clean:
    desc: Remove build directory and work library
    cmds:
      - rm -rf {{.BUILD_DIR}}
